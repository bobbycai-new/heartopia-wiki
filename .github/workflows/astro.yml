# Sample workflow for deploying a pre-built Astro site to GitHub Pages
#
# To get started with Astro see: https://docs.astro.build/en/getting-started/
#
name: Deploy Astro site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # default value when not using subfolders

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Clean old deploy files
        run: |
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.xml" -o -name "*.txt" -o -name "*.svg" \) ! -name "CNAME" -delete
          find . -maxdepth 1 -type d -name "_astro" -exec rm -rf {} + 2>/dev/null || true
          find . -maxdepth 1 -type d -name "heartopia" -exec rm -rf {} + 2>/dev/null || true
          find . -maxdepth 1 -type d -name "about" -exec rm -rf {} + 2>/dev/null || true
          find . -maxdepth 1 -type d -name "api" -exec rm -rf {} + 2>/dev/null || true
          find . -maxdepth 1 -type d -name "codes" -exec rm -rf {} + 2>/dev/null || true
          find . -maxdepth 1 -type d -name "tools" -exec rm -rf {} + 2>/dev/null || true
          find . -maxdepth 1 -type d -name "zh" -exec rm -rf {} + 2>/dev/null || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
